<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://app.mdworx.test;
                 script-src 'self' https://app.mdworx.test 'unsafe-inline';
                 style-src 'self' https://app.mdworx.test 'unsafe-inline';
                 img-src 'self' https://app.mdworx.test https://local.mdworx.test https: http: data:;
                 font-src 'self' https://app.mdworx.test data:;
                 connect-src 'self' https://app.mdworx.test;
                 frame-src 'none';
                 object-src 'none';
                 base-uri 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mdWorX</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body class="theme-light mode-reading">
  <div id="toolbar" class="toolbar" role="toolbar" aria-label="View mode">
    <div class="toolbar-group toolbar-main">
      <button type="button" data-mode="reading" title="Reading (read-only)">Reading</button>
      <button type="button" data-mode="live"    title="Live edit (Ctrl+E cycles)">Live</button>
      <button type="button" data-mode="source"  title="Source (click again to toggle split preview)">Source</button>
      <span class="tbm-sep"></span>
      <button type="button" data-action="save" class="tbm-icon" disabled title="Save (Ctrl+S)" aria-label="Save">
        <svg viewBox="0 0 24 24" class="etb-icon"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
      </button>
      <button type="button" data-action="saveAs" class="tbm-icon" title="Save As (Ctrl+Shift+S)" aria-label="Save As">
        <svg viewBox="0 0 24 24" class="etb-icon"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 13 8"/><path d="M18 14v6"/><path d="M15 17h6"/></svg>
      </button>
      <button type="button" data-action="wrap" class="tbm-icon" title="Toggle word wrap (code blocks, long lines)" aria-label="Toggle word wrap">
        <svg viewBox="0 0 24 24" class="etb-icon"><line x1="3" y1="6" x2="21" y2="6"/><path d="M3 12h15a3 3 0 0 1 0 6h-4"/><polyline points="16 16 14 18 16 20"/><line x1="3" y1="18" x2="10" y2="18"/></svg>
      </button>
      <button type="button" data-action="settings" class="tbm-icon" title="Open mdWorX settings" aria-label="Open settings">
        <svg viewBox="0 0 24 24" class="etb-icon"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
      <span id="status" class="status" aria-live="polite"></span>
    </div>
  </div>

  <div id="editing-toolbar" class="editing-toolbar" role="toolbar" aria-label="Formatting">
    <div class="etb-group">
      <button type="button" data-cmd="bold"   title="Bold (**text**)" aria-label="Bold"><span class="etb-glyph etb-glyph-bold">B</span></button>
      <button type="button" data-cmd="italic" title="Italic (*text*)" aria-label="Italic"><span class="etb-glyph etb-glyph-italic">I</span></button>
      <button type="button" data-cmd="strike" title="Strikethrough (~~text~~)" aria-label="Strikethrough"><span class="etb-glyph etb-glyph-strike">S</span></button>
      <button type="button" data-cmd="inlineCode" title="Inline code (`text`)" aria-label="Inline code">
        <svg viewBox="0 0 24 24" class="etb-icon"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
      </button>
      <button type="button" data-cmd="link" title="Insert link" aria-label="Insert link">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
      </button>
      <button type="button" data-cmd="footnote" title="Insert footnote [^N] + def stub at doc end" aria-label="Insert footnote">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <path d="M4 6h11"/>
          <path d="M9.5 6v13"/>
          <text x="17" y="11" font-size="9" font-weight="700" fill="currentColor" stroke="none" font-family="system-ui, sans-serif">1</text>
        </svg>
      </button>
    </div>
    <span class="etb-sep"></span>
    <div class="etb-group">
      <button type="button" data-cmd="heading1" title="Heading 1" aria-label="Heading 1">
        <svg viewBox="0 0 24 24" class="etb-icon"><path d="M4 12h8"/><path d="M4 18V6"/><path d="M12 18V6"/><path d="m17 12 3-2v8"/></svg>
      </button>
      <button type="button" data-cmd="heading2" title="Heading 2" aria-label="Heading 2">
        <svg viewBox="0 0 24 24" class="etb-icon"><path d="M4 12h8"/><path d="M4 18V6"/><path d="M12 18V6"/><path d="M17 9.5C17 8 18 7 19.5 7S22 8 22 9.5c0 2.5-5 4.5-5 8.5h5"/></svg>
      </button>
      <button type="button" data-cmd="heading3" title="Heading 3" aria-label="Heading 3">
        <svg viewBox="0 0 24 24" class="etb-icon"><path d="M4 12h8"/><path d="M4 18V6"/><path d="M12 18V6"/><path d="M17.5 8.5C18.5 7 21 7 22 8.7c1 1.7-1 3.6-2.5 3.6 1.7 0 3.5 1.4 2.8 3.4-.7 2-3.5 2.4-5 .8"/></svg>
      </button>
    </div>
    <span class="etb-sep"></span>
    <div class="etb-group">
      <button type="button" data-cmd="bulletList" title="Bulleted list" aria-label="Bulleted list">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <line x1="9" y1="6" x2="21" y2="6"/>
          <line x1="9" y1="12" x2="21" y2="12"/>
          <line x1="9" y1="18" x2="21" y2="18"/>
          <circle cx="4.5" cy="6" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="4.5" cy="12" r="1.5" fill="currentColor" stroke="none"/>
          <circle cx="4.5" cy="18" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button type="button" data-cmd="orderedList" title="Numbered list" aria-label="Numbered list">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <line x1="10" y1="6" x2="21" y2="6"/>
          <line x1="10" y1="12" x2="21" y2="12"/>
          <line x1="10" y1="18" x2="21" y2="18"/>
          <path d="M4 4v4M3 4h2M3 8h3"/>
          <path d="M3 10.5c0-.8.7-1.5 1.5-1.5S6 9.7 6 10.5c0 1.5-3 2-3 3.5h3"/>
          <path d="M3 16h2.5c.8 0 1.5.7 1.5 1.5S6.3 19 5.5 19H4M5.5 19c.8 0 1.5.7 1.5 1.5S6.3 22 5.5 22H3"/>
        </svg>
      </button>
      <button type="button" data-cmd="taskList" title="Task list ([ ])" aria-label="Task list">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <rect x="3" y="4" width="7" height="7" rx="1.5"/>
          <polyline points="4.5 7.5 6 9 9 6" stroke-width="2"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <line x1="13" y1="7.5" x2="21" y2="7.5"/>
          <line x1="13" y1="17.5" x2="21" y2="17.5"/>
        </svg>
      </button>
    </div>
    <span class="etb-sep"></span>
    <div class="etb-group">
      <button type="button" data-cmd="outdent" title="Decrease indent (outdent)" aria-label="Outdent">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
          <line x1="11" y1="12" x2="21" y2="12"/>
          <polyline points="7 8 3 12 7 16"/>
        </svg>
      </button>
      <button type="button" data-cmd="indent" title="Increase indent" aria-label="Indent">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
          <line x1="11" y1="12" x2="21" y2="12"/>
          <polyline points="3 8 7 12 3 16"/>
        </svg>
      </button>
    </div>
    <span class="etb-sep"></span>
    <div class="etb-group">
      <button type="button" data-cmd="quote" title="Blockquote" aria-label="Blockquote">
        <svg viewBox="0 0 24 24" class="etb-icon" fill="currentColor" stroke="none">
          <path d="M9 7H5a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h2v1c0 1.1-.9 2-2 2H4v2h1c2.2 0 4-1.8 4-4V9c0-1.1-.9-2-2-2zm10 0h-4a2 2 0 0 0-2 2v3a2 2 0 0 0 2 2h2v1c0 1.1-.9 2-2 2h-1v2h1c2.2 0 4-1.8 4-4V9c0-1.1-.9-2-2-2z"/>
        </svg>
      </button>
      <button type="button" data-cmd="codeBlock" title="Insert fenced code block (```)" aria-label="Insert code block">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <polyline points="10 9 7 12 10 15"/>
          <polyline points="14 9 17 12 14 15"/>
        </svg>
      </button>
      <button type="button" data-cmd="image" title="Insert image (pick from disk, set size and alignment)" aria-label="Insert image" id="etb-image-btn">
        <svg viewBox="0 0 24 24" class="etb-icon">
          <rect x="3" y="4" width="18" height="16" rx="2"/>
          <circle cx="9" cy="10" r="1.6" fill="currentColor" stroke="none"/>
          <path d="M21 17l-5-5-8 8" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Image insert popup. Anchored to the image toolbar button.
       Source can be a local file (Browse picks one and fills the input)
       or a URL (paste/type directly). Dimensions are optional px values;
       alignment defaults to None (no wrapper). -->
  <div id="image-popup" class="image-popup" hidden role="dialog" aria-label="Insert image">
    <div class="img-pop-row">
      <label for="img-pop-src">Source</label>
      <input type="text" id="img-pop-src" placeholder="https://... or relative path, or click Browse" autocomplete="off" spellcheck="false">
      <button type="button" id="img-pop-browse" class="btn">Browse...</button>
    </div>
    <div class="img-pop-row">
      <label for="img-pop-alt">Alt text</label>
      <input type="text" id="img-pop-alt" placeholder="Description for screen readers (optional)" autocomplete="off">
    </div>
    <div class="img-pop-row img-pop-row-dims">
      <label for="img-pop-width">Width</label>
      <input type="number" id="img-pop-width" min="1" max="10000" step="1" placeholder="auto"><span class="img-pop-unit">px</span>
      <label for="img-pop-height">Height</label>
      <input type="number" id="img-pop-height" min="1" max="10000" step="1" placeholder="auto"><span class="img-pop-unit">px</span>
    </div>
    <div class="img-pop-row">
      <label>Alignment</label>
      <div class="img-pop-align" role="radiogroup" aria-label="Image alignment">
        <label><input type="radio" name="img-pop-align" value="none" checked> None</label>
        <label><input type="radio" name="img-pop-align" value="left"> Left</label>
        <label><input type="radio" name="img-pop-align" value="center"> Center</label>
        <label><input type="radio" name="img-pop-align" value="right"> Right</label>
      </div>
    </div>
    <div class="img-pop-row">
      <label></label>
      <label class="img-pop-copy">
        <input type="checkbox" id="img-pop-copy">
        Copy file to this document's folder
      </label>
    </div>
    <div class="img-pop-row img-pop-row-actions">
      <button type="button" id="img-pop-cancel" class="btn">Cancel</button>
      <button type="button" id="img-pop-insert" class="btn btn-primary" disabled>Insert</button>
    </div>
  </div>

  <div class="page">
    <article id="content"></article>
    <div id="split-handle" class="split-handle">
      <button type="button" id="split-link-toggle" class="split-link-toggle" title="Linked scrolling (click to unlink)" aria-label="Toggle linked scrolling between source and preview">
        <svg class="split-link-icon split-link-icon-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
          <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
        </svg>
        <svg class="split-link-icon split-link-icon-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M18.84 12.25l1.72-1.71a5 5 0 0 0-7.06-7.07l-1.72 1.71"/>
          <path d="M5.17 11.75l-1.71 1.71a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          <line x1="8" y1="2" x2="8" y2="5"/>
          <line x1="2" y1="8" x2="5" y2="8"/>
          <line x1="16" y1="22" x2="16" y2="19"/>
          <line x1="22" y1="16" x2="19" y2="16"/>
        </svg>
      </button>
    </div>
    <div id="editor" class="editor"></div>
    <div id="initial" class="initial">
      <div class="chip">mdWorX</div>
      <h1>Loading file...</h1>
    </div>
  </div>
  <script src="viewer.js" defer></script>
</body>
</html>
