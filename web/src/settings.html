<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://app.mdworx.test;
                 script-src 'self' https://app.mdworx.test 'unsafe-inline';
                 style-src 'self' https://app.mdworx.test 'unsafe-inline';
                 img-src 'self' https://app.mdworx.test data:;
                 font-src 'self' https://app.mdworx.test data:;
                 connect-src 'self' https://app.mdworx.test;
                 frame-src 'none';
                 object-src 'none';
                 base-uri 'none';">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>mdWorX Settings</title>
  <link rel="stylesheet" href="viewer.css">
  <link rel="stylesheet" href="settings.css">
</head>
<body class="theme-light">
  <main class="settings-shell">
    <header class="settings-head">
      <h1>mdWorX Settings</h1>
      <p class="settings-sub">
        Changes apply to every open viewer pane when you click Apply.
        Empty fields mean "use the theme default".
      </p>
    </header>
    <form id="settings-form" class="settings-form" autocomplete="off"></form>
    <footer class="settings-foot">
      <span id="status" class="status"></span>
      <button type="button" id="btn-reset" class="btn btn-link" title="Clear every field back to its default (does NOT save until you click Apply)">Reset all fields</button>
      <button type="button" id="btn-close" class="btn">Close</button>
      <button type="button" id="btn-apply" class="btn btn-primary">Apply</button>
    </footer>
  </main>
  <script src="settings.js" defer></script>
</body>
</html>
